name: Update Repository Metadata

on:
  push:
    branches: [ main ]
    paths:
      - '.github/metadata.json'
  workflow_dispatch:

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    permissions:
      repository-projects: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Update GitHub Repository Info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const metadata = JSON.parse(fs.readFileSync('.github/metadata.json', 'utf8'));
            
            console.log('Updating repository metadata...');
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: metadata.description,
              homepage: metadata.homepage || '',
              topics: metadata.topics
            });
            console.log('Successfully updated description and topics.');
