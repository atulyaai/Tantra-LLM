name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest
      - name: Smoke generate
        run: python -c "from npdna import NpDnaCore; core = NpDnaCore.load('model/npdna_v3/best'); print(core.generate('Hello.', max_tokens=3))"
